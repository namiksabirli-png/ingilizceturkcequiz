let sets=[], currentSetIndex=0, setQuestions=[], current=0;
let score=0, wrongAnswers=[];
let activeCategory="";

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

function showInfo(type){
  let tbody=document.getElementById("infoBody"); 
  tbody.innerHTML="";
  document.getElementById("infoTable").style.display="table";
  document.getElementById("quizArea").style.display="none";
  document.getElementById("result").style.display="none";

  let dataset = (type==="sentences")?sentences:(type==="verbs")?verbs:adjectives;
  dataset.forEach(item=>{
    let tr=document.createElement("tr");
    let tdEn=document.createElement("td");
    tdEn.textContent=item.en;
    tdEn.onclick=()=>speakText(item.en,'en-US');
    let tdTr=document.createElement("td");
    tdTr.textContent=item.tr;
    tdTr.onclick=()=>speakText(item.tr,'tr-TR');
    tr.appendChild(tdEn); tr.appendChild(tdTr);
    tbody.appendChild(tr);
  });
}

function speakText(text,lang){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    let utterance=new SpeechSynthesisUtterance(text);
    utterance.lang=lang;
    window.speechSynthesis.speak(utterance);
  }
}

function startAll(type){
  activeCategory=type;
  document.getElementById("infoTable").style.display="none";
  let dataset=(type==="sentences")?sentences:(type==="verbs")?verbs:adjectives;
  let shuffled=shuffle([...dataset]);
  sets=[];
  for(let i=0;i<shuffled.length;i+=15){sets.push(shuffled.slice(i,i+15));}
  currentSetIndex=0;
  startSet();
}

function startSet(){
  setQuestions=sets[currentSetIndex];
  current=0; score=0; wrongAnswers=[];
  document.getElementById("quizArea").style.display="block";
  document.getElementById("result").style.display="none";
  document.getElementById("nextSetBtn").style.display="none";
  document.getElementById("checkWrongBtn").style.display="none";
  loadQuestion();
}

function loadQuestion(){
  if(current>=setQuestions.length){endSet(); return;}
  let q=setQuestions[current];
  document.getElementById("question").textContent=`Translate: ${q.en}`;
  document.getElementById("progress").textContent=`Soru ${current+1} / ${setQuestions.length}`;
  document.getElementById("scoreTrack").textContent=`Doğru: ${score} / Yanlış: ${wrongAnswers.length}`;
  let optionsDiv=document.getElementById("options"); optionsDiv.innerHTML="";

  let dataset=(activeCategory==="sentences")?sentences:(activeCategory==="verbs")?verbs:adjectives;
  let answers=[q.tr];
  while(answers.length<3){
    let r=dataset[Math.floor(Math.random()*dataset.length)].tr;
    if(!answers.includes(r)) answers.push(r);
  }
  answers=shuffle(answers);
  let letters=["A","B","C"];
  answers.forEach((ans,idx)=>{
    let btn=document.createElement("button");
    btn.className="option"; 
    btn.textContent=`${letters[idx]}) ${ans}`;
    btn.dataset.value=ans;
    btn.onclick=()=>checkAnswer(btn,q.tr);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(btn,correct){
  let opts=document.querySelectorAll(".option"); opts.forEach(b=>b.disabled=true);
  if(btn.dataset.value===correct){
    btn.classList.add("correct"); 
    score++;
    setTimeout(()=>{btn.classList.remove("correct");btn.classList.add("reveal");},1000);
  } else {
    btn.classList.add("wrong");
    if(!wrongAnswers.includes(setQuestions[current])) wrongAnswers.push(setQuestions[current]);
    opts.forEach(o=>{
      if(o.dataset.value===correct){ setTimeout(()=>o.classList.add("reveal"),1000);}
    });
  }
  setTimeout(()=>{current++; loadQuestion();},1500);
}

function endSet(){
  document.getElementById("quizArea").style.display="none";
  document.getElementById("result").style.display="block";
  document.getElementById("setResult").textContent=`Set ${currentSetIndex+1} Bitti! Skor: ${score}/${setQuestions.length}`;
  if(wrongAnswers.length){
    document.getElementById("wrongList").textContent="Yanlışlar:\n"+wrongAnswers.map(x=>`• ${x.en} = ${x.tr}`).join("\n");
    document.getElementById("checkWrongBtn").style.display="inline-block";
  } else {
    document.getElementById("wrongList").textContent="Tümünü doğru yaptınız 👏";
  }
  if(currentSetIndex<sets.length-1){
    currentSetIndex++;
    document.getElementById("nextSetBtn").style.display="inline-block";
    document.getElementById("nextSetBtn").textContent=`▶️ Set ${currentSetIndex+1} Başla`;
  }
}

function reviewWrongs(){
  if(!wrongAnswers.length)return;
  setQuestions=shuffle([...wrongAnswers]);
  current=0;
  document.getElementById("result").style.display="none";
  document.getElementById("quizArea").style.display="block";
  loadQuestion();
}
