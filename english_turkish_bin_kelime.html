  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>📚 English → Turkish Quiz</h1>
      <div class="sub">Click the English word. It will speak the correct pronunciation and show 3 Turkish options (1 correct, 2 distractors).</div>
      <div class="controls">
        <button class="btn" onclick="generateNewSet()">🎯 New Set (15)</button>
        <button id="audioToggle" class="audio-toggle" onclick="toggleAudio()">🔊 Voice: On</button>
        <div class="stats">
          <div><span>✅ Correct</span><b id="stat-c">0</b></div>
          <div><span>❌ Wrong</span><b id="stat-w">0</b></div>

        </div>
      </div>
      <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress"><b id="stat-a">0</b> / 15 answered</div>
      <div id="list" class="grid"></div>
      <div id="final" class="final" style="display:none"></div>

// Parse list
const vocabulary=rawList.split("\n").filter(Boolean).map(line=>{
  const [en,tr]=line.split("→").map(s=>s.trim());
  return {english:en,turkish:tr};
});

// Speech setup
let voiceEnabled=true;
let enVoices=[];

function loadVoices(){
  enVoices=speechSynthesis.getVoices().filter(v=>v.lang.toLowerCase().startsWith("en"));
}
speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

function speak(word){
  if(!voiceEnabled) return;
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang="en-US";
  u.rate=0.9;
  if(enVoices.length) u.voice=enVoices[0];
  speechSynthesis.speak(u);
}

function toggleAudio(){
  voiceEnabled=!voiceEnabled;
  document.getElementById("audioToggle").textContent=voiceEnabled?"🔊 Voice: On":"🔇 Voice: Off";
  if(!voiceEnabled) speechSynthesis.cancel();
}

// Helpers
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(arr,n){return shuffle(arr).slice(0,n);}

let currentSet=[],answered=0,correct=0,wrong=0;

function generateNewSet(){
  // Kelime listesini karıştır ve 15 seç
  currentSet=shuffle(vocabulary).slice(0,15).map((w,i)=>({...w,idx:i}));
  answered=0;correct=0;wrong=0;
  renderList();
  updateStats();
  document.getElementById("final").style.display="none";
  document.getElementById("final").innerHTML="";
}

function renderList(){
  const mount=document.getElementById("list");
  mount.innerHTML="";
  currentSet.forEach(w=>{
    const card=document.createElement("div");
    card.className="card";
    card.id=`card-${w.idx}`;
    const optsId=`opts-${w.idx}`;
    const resId=`res-${w.idx}`;
    card.innerHTML=`
      <div class="english" onclick="onWordClick('${optsId}','${w.english.replace(/'/g,"\\'")}')">
        ${w.english}
        <span class="speak-icon">🔊</span>
      </div>
      <div class="options" id="${optsId}"></div>
      <div class="result" id="${resId}"></div>
    `;
    mount.appendChild(card);

    // Yanlış cevaplar (2 adet)
    const wrongs=sample(vocabulary.filter(x=>x.turkish!==w.turkish),2).map(x=>x.turkish);
    const options=shuffle([w.turkish,...wrongs]);
    const optsDiv=card.querySelector("#"+optsId);
    options.forEach(opt=>{
      const btn=document.createElement("button");
      btn.className="option";
      btn.textContent=opt;
      btn.dataset.correct=opt===w.turkish ? "true" : "false";
      btn.onclick=()=>checkAnswer(w,btn,optsDiv,resId);
      optsDiv.appendChild(btn);
    });
  });
}

function onWordClick(optsId,word){
  const optsDiv=document.getElementById(optsId);
  if(optsDiv.style.display==="block") return;
  optsDiv.style.display="block";
  speak(word);
}

function checkAnswer(word,clickedBtn,optsDiv,resId){
  // Eğer zaten cevaplanmışsa çık
  if(clickedBtn.disabled) return;
  
  const isCorrect=clickedBtn.dataset.correct==="true";
  const card=optsDiv.closest(".card");
  const res=document.getElementById(resId);
  
  // Tüm butonları devre dışı bırak
  optsDiv.querySelectorAll("button").forEach(b=>{
    b.disabled=true;
    if(b.dataset.correct==="true"){
      b.classList.add("correct-answer");
    }
    if(b===clickedBtn && !isCorrect){
      b.classList.add("wrong-answer");
    }
  });
  
  answered++;
  if(isCorrect){
    correct++;
    res.innerHTML="✅ <span class='correct'>Correct!</span>";
    card.classList.add("answered-correct");
    // Doğru sesi
    if(voiceEnabled && "speechSynthesis" in window){
      const u=new SpeechSynthesisUtterance("Correct!");
      u.lang="en-US";
      u.rate=0.9;
      speechSynthesis.speak(u);
    }
  } else {
    wrong++;
    res.innerHTML=`❌ <span class='incorrect'>Wrong!</span><br/>Correct: <b>${word.turkish}</b>`;
    card.classList.add("answered-wrong");
  }
  updateStats();
  if(answered===15) showFinal();
}

function updateStats(){
  const score=Math.round((correct/Math.max(1,answered))*100);
  document.getElementById("stat-c").textContent=correct;
  document.getElementById("stat-w").textContent=wrong;
  document.getElementById("stat-s").textContent=`${answered?score:0}%`;
  document.getElementById("stat-a").textContent=answered;
  document.getElementById("progressFill").style.width=`${(answered/15)*100}%`;
}

function showFinal(){
  const score=Math.round((correct/15)*100);
  let msg="Practice more! 💪";
  let emoji="📚";
  if(score>=90){ msg="Excellent! 🌟"; emoji="🏆"; }
  else if(score>=70){ msg="Very good! 👏"; emoji="⭐"; }
  else if(score>=50){ msg="Not bad! 😊"; emoji="👍"; }
  
  const fin=document.getElementById("final");
  fin.style.display="block";
  fin.innerHTML=`
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <div style="font-size:48px;">${emoji}</div>
      <div>
        <div class="score-big">${score}%</div>
        <div style="font-weight:700;font-size:18px;">${msg}</div>
        <div class="detail">✅ Correct: ${correct} | ❌ Wrong: ${wrong} | 📝 Total: 15</div>
      </div>
    </div>
  `;
}

// run first
generateNewSet();
